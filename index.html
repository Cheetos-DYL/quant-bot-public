<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ESOS Quant Agent — Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font:14px/1.5 system-ui,sans-serif;background:#f5f5f5;color:#333;padding:20px;max-width:900px;margin:0 auto}
h1{font-size:24px;margin-bottom:4px}.sub{font-size:14px;color:#888;margin-bottom:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:24px}
.card{background:#fff;border:1px solid #e5e5e5;border-radius:8px;padding:16px}
.card .label{font-size:11px;text-transform:uppercase;color:#999;margin-bottom:4px;letter-spacing:.5px}
.card .value{font-size:22px;font-weight:600}.card .sub{font-size:12px;color:#999;margin-top:2px}
.green{color:#16a34a}.red{color:#dc2626}
h2{font-size:18px;margin:24px 0 12px;padding-bottom:8px;border-bottom:1px solid #e5e5e5}
table{width:100%;border-collapse:collapse;background:#fff;border:1px solid #e5e5e5;border-radius:8px;overflow:hidden}
th{text-align:left;padding:10px 14px;font-size:11px;text-transform:uppercase;color:#999;background:#fafafa;border-bottom:1px solid #e5e5e5}
td{padding:10px 14px;border-bottom:1px solid #f0f0f0;font-size:14px}
tr:last-child td{border-bottom:none}
td .name{display:block;font-size:11px;color:#999}
.footer{margin-top:48px;padding-top:16px;border-top:1px solid #e5e5e5;font-size:12px;color:#999;text-align:center}
.note{background:#fef3c7;border:1px solid #f59e0b;border-radius:8px;padding:12px;margin-bottom:20px;font-size:13px;color:#92400e}
</style>
</head>
<body>

<h1>ESOS Quant Agent</h1>
<div class="sub">PAPER · Read-only snapshot</div>

<div class="note">📊 This is a delayed snapshot. Live dashboard runs on Don's machine. Data refreshes every few hours.</div>

<div class="grid" id="cards"></div>

<h2>Positions</h2>
<table>
  <thead><tr><th>Symbol</th><th>Qty</th><th>Entry</th><th>Value</th><th>P&amp;L</th></tr></thead>
  <tbody id="positions"></tbody>
</table>

<h2>🔍 Screening Candidates</h2>
<table>
  <thead><tr><th>Symbol</th><th>Price</th><th>P/E</th><th>Fwd P/E</th><th>PEG</th><th>Margin</th><th>ROE</th><th>Rev Gr</th><th>Beta</th></tr></thead>
  <tbody id="candidates"></tbody>
</table>

<div class="footer" id="footer"></div>

<script>
const NAMES = {
  "FTNT":"Fortinet","NKE":"Nike","NFLX":"Netflix","PFE":"Pfizer","CME":"CME Group",
  "WM":"Waste Management","INTU":"Intuit","CRCL":"Circle Internet Group",
  "AAPL":"Apple","MSFT":"Microsoft","GOOGL":"Alphabet","AMZN":"Amazon","SPY":"S&P 500 ETF",
  "088980":"Macquarie Infra","TSLA":"Tesla"
};

fetch("data.json")
  .then(r => r.json())
  .then(d => {
    const fmt = (n,d) => Number(n).toLocaleString("en",{minimumFractionDigits:d,maximumFractionDigits:d});
    const pnl = d.daily_pnl || 0;

    document.getElementById("cards").innerHTML =
      ["PORTFOLIO|$"+fmt(d.portfolio_value,2)+"|",
       "CASH|$"+fmt(d.cash,2)+"|",
       "DAILY P&L|"+(pnl>=0?"+":"")+fmt(pnl,2)+"%|"+(pnl>=0?"green":"red"),
       "TRADES|"+d.total_trades+"|Win rate: "+d.win_rate+"%",
       "LOSS STREAK|"+d.consecutive_losses+"|Max 5 before halt",
       "POSITIONS|"+d.open_positions+"|Max: 5"
      ].map(c => {
        const [l,v,s,cl] = c.split("|");
        return `<div class="card"><div class="label">${l}</div><div class="value ${cl||""}">${v}</div><div class="sub">${s}</div></div>`;
      }).join("");

    const pos = d.positions || {};
    const rows = Object.entries(pos);
    document.getElementById("positions").innerHTML = rows.length
      ? rows.map(([sym,p]) => {
          const pl = p.unrealized_plpc || 0;
          const cls = pl >= 0 ? "green" : "red";
          const name = NAMES[sym] || sym;
          const entry = p.currency === "KRW" ? "₩"+fmt(p.avg_entry_price,0) : "$"+fmt(p.avg_entry_price,2);
          const value = p.currency === "KRW" ? "₩"+fmt(p.market_value,0) : "$"+fmt(p.market_value,2);
          return `<tr><td>${sym}<span class="name">${name}</span></td><td>${fmt(p.qty,0)}</td><td>${entry}</td><td>${value}</td><td class="${cls}">${pl>=0?"+":""}${fmt(pl,1)}%</td></tr>`;
        }).join("")
      : '<tr><td colspan="5" style="color:#999">No positions</td></tr>';

    document.getElementById("footer").textContent = `ESOS Quant Agent · PAPER · Snapshot: ${d.updated}`;

    const candidates = d.candidates || [];
    document.getElementById("candidates").innerHTML = candidates.length
      ? candidates.map(c =>
          `<tr><td><b>${c.symbol}</b></td><td>$${fmt(c.price,2)}</td><td>${c.pe}x</td><td>${c.fwd_pe}x</td><td>${c.peg}x</td><td><b>${c.margin}%</b></td><td>${c.roe}%</td><td>${c.rev_growth}%</td><td>${c.beta}</td></tr>`
        ).join("")
      : '<tr><td colspan="9" style="color:#999">No candidates yet</td></tr>';
  })
  .catch(() => document.body.innerHTML += '<p style="color:#dc2626">Failed to load data. Check back later.</p>');
</script>
</body>
</html>
